<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔術方塊早餐選擇器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #121212;
            color: white;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* 魔方外殼 */
        .cube-container {
            width: min(300px, calc(100vw - 2.5rem));
            height: min(300px, calc(100vw - 2.5rem));
            padding: 12px;
            background: #1a1a1a;
            border: 4px solid #333;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            overflow: hidden;
            position: relative;
        }

        .cube-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .cube-cell {
            background-color: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            color: #000;
            text-align: center;
            transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
            position: relative;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 選項標籤樣式 */
        .option-tag {
            transition: all 0.3s ease;
        }
        
        .option-tag.removed {
            opacity: 0.2;
            text-decoration: line-through;
            transform: scale(0.9);
            filter: grayscale(1);
        }

        /* 慶祝碎片 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-4 pt-8 sm:p-6 sm:pt-10">

    <div class="text-center mb-8">
        <h1 class="text-3xl sm:text-4xl font-black italic tracking-tighter text-blue-500 mb-1">CUBE BREAKFAST</h1>
        <p class="text-gray-500 text-sm font-bold uppercase tracking-widest">兒子專屬機械魔方</p>
    </div>

    <!-- 早餐清單 -->
    <div class="mb-8 w-full max-w-sm">
        <div class="flex justify-between items-end mb-3 px-1">
            <h2 class="text-lg font-black text-white border-b-2 border-blue-500">今日選單</h2>
            <button onclick="resetOptions()" class="text-[10px] font-bold text-gray-400 border border-gray-700 px-2 py-1 rounded hover:bg-gray-800 transition">重置進度</button>
        </div>
        <div id="statusList" class="flex flex-wrap gap-2 justify-center">
            <!-- 動態生成標籤 -->
        </div>
    </div>

    <!-- 魔方主體 -->
    <div class="cube-container mb-6" id="cubeTrigger" onclick="startSelection()">
        <div id="cubeGrid" class="cube-grid cursor-pointer">
            <div id="cell-0" class="cube-cell bg-red-600"></div>
            <div id="cell-1" class="cube-cell bg-blue-600"></div>
            <div id="cell-2" class="cube-cell bg-green-600"></div>
            <div id="cell-3" class="cube-cell bg-orange-600"></div>
            <div id="cell-4" class="cube-cell bg-yellow-500"></div>
            <div id="cell-5" class="cube-cell bg-slate-100"></div>
            <div id="cell-6" class="cube-cell bg-red-600"></div>
            <div id="cell-7" class="cube-cell bg-blue-600"></div>
            <div id="cell-8" class="cube-cell bg-green-600"></div>
        </div>
    </div>
    <p class="text-center text-gray-600 text-xs font-bold animate-bounce">點擊方塊啟動引擎！</p>

    <!-- 結果彈窗 -->
    <div id="resultModal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden p-6 backdrop-blur-md">
        <div class="bg-gray-900 border-2 border-blue-500 p-8 rounded-2xl text-center max-w-sm w-full shadow-[0_0_50px_rgba(59,130,246,0.3)]">
            <div id="modalColorStrip" class="h-2 w-16 mx-auto rounded-full mb-6"></div>
            <p class="text-gray-400 font-bold mb-2 tracking-widest text-xs uppercase">Target Acquired</p>
            <h3 id="resultText" class="text-4xl font-black mb-8 text-white tracking-tight"></h3>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-500 transition text-lg shadow-lg">準備開動</button>
        </div>
    </div>

    <script>
        const breakfastItems = [
            { text: "貝果", color: "#DC2626" },   // 紅
            { text: "逼逼波波", color: "#16A34A" }, // 綠
            { text: "肉鬆蛋吐司", color: "#2563EB" }, // 藍
            { text: "穀片+2蛋", color: "#CA8A04" }, // 黃
            { text: "巧克力厚片", color: "#EA580C" } // 橘
        ];

        let availableIndices = breakfastItems.map((_, i) => i);
        let isProcessing = false;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 模擬更真實的機械音
        function playSound(type) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const startTime = audioCtx.currentTime;
            
            if (type === 'tick') {
                // 機械轉動聲 (由兩個短促頻率組成)
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                
                osc1.type = 'square'; // 方波更有機械質感
                osc1.frequency.setValueAtTime(120, startTime);
                osc1.frequency.linearRampToValueAtTime(40, startTime + 0.08);
                
                gain1.gain.setValueAtTime(0.08, startTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, startTime + 0.08);
                
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                
                osc1.start(startTime);
                osc1.stop(startTime + 0.08);

                // 增加一點高頻的金屬摩擦聲
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(800, startTime);
                gain2.gain.setValueAtTime(0.02, startTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, startTime + 0.04);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start(startTime);
                osc2.stop(startTime + 0.04);

            } else if (type === 'win') {
                // 勝利提示音 (琶音感覺)
                [440, 554, 659, 880].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, startTime + i * 0.08);
                    gain.gain.setValueAtTime(0.1, startTime + i * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + i * 0.08 + 0.3);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime + i * 0.08);
                    osc.stop(startTime + i * 0.08 + 0.4);
                });
            }
        }

        function renderList() {
            const listContainer = document.getElementById('statusList');
            listContainer.innerHTML = '';
            breakfastItems.forEach((item, idx) => {
                const isRemoved = !availableIndices.includes(idx);
                const span = document.createElement('div');
                span.className = `option-tag px-3 py-1.5 rounded-full border text-xs font-bold flex items-center gap-2 ${isRemoved ? 'removed bg-gray-800/20 border-gray-800 text-gray-600' : 'bg-gray-800 border-gray-700 text-white'}`;
                span.innerHTML = `<div class="w-2 h-2 rounded-full shadow-[0_0_5px_rgba(255,255,255,0.2)]" style="background-color: ${item.color}"></div>${item.text}`;
                listContainer.appendChild(span);
            });
        }

        function moveCube() {
            const isRow = Math.random() > 0.5;
            const index = Math.floor(Math.random() * 3);
            const direction = Math.random() > 0.5 ? 1 : -1;
            
            const cellElements = [];
            if (isRow) {
                for (let i = 0; i < 3; i++) cellElements.push(document.getElementById(`cell-${index * 3 + i}`));
            } else {
                for (let i = 0; i < 3; i++) cellElements.push(document.getElementById(`cell-${index + i * 3}`));
            }

            // 播放旋轉聲
            playSound('tick');

            cellElements.forEach(el => {
                const moveVal = direction * 105; // 稍微多出一點點讓邊緣乾淨
                el.style.transform = isRow ? `translateX(${moveVal}%)` : `translateY(${moveVal}%)`;
            });

            setTimeout(() => {
                cellElements.forEach(el => {
                    el.style.transition = 'none';
                    el.style.transform = 'translate(0,0)';
                    const randomItemIdx = Math.floor(Math.random() * breakfastItems.length);
                    el.style.backgroundColor = breakfastItems[randomItemIdx].color;
                    setTimeout(() => el.style.transition = 'transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s', 10);
                });
            }, 180);
        }

        function startSelection() {
            if (isProcessing || availableIndices.length === 0) return;
            isProcessing = true;

            let count = 0;
            const maxMoves = 18;
            const interval = setInterval(() => {
                moveCube();
                count++;
                if (count >= maxMoves) {
                    clearInterval(interval);
                    setTimeout(finalizeSelection, 400);
                }
            }, 220);
        }

        function finalizeSelection() {
            const luckyIdx = Math.floor(Math.random() * availableIndices.length);
            const itemIdx = availableIndices[luckyIdx];
            const result = breakfastItems[itemIdx];

            const cells = document.querySelectorAll('.cube-cell');
            cells.forEach((cell, i) => {
                cell.style.backgroundColor = result.color;
                cell.style.boxShadow = `inset 0 0 20px rgba(0,0,0,0.5), 0 0 15px ${result.color}44`;
                if (i === 4) cell.innerText = result.text;
            });

            availableIndices.splice(luckyIdx, 1);

            setTimeout(() => {
                showResult(result);
                renderList();
                isProcessing = false;
            }, 700);
        }

        function showResult(item) {
            const modal = document.getElementById('resultModal');
            document.getElementById('resultText').innerText = item.text;
            document.getElementById('modalColorStrip').style.backgroundColor = item.color;
            modal.classList.remove('hidden');
            playSound('win');
            createConfetti(item.color);
        }

        function closeModal() {
            document.getElementById('resultModal').classList.add('hidden');
            const cells = document.querySelectorAll('.cube-cell');
            const defaultColors = ['#DC2626', '#2563EB', '#16A34A', '#EA580C', '#CA8A04', '#F1F5F9', '#DC2626', '#2563EB', '#16A34A'];
            cells.forEach((cell, i) => {
                cell.style.backgroundColor = defaultColors[i];
                cell.style.boxShadow = 'inset 0 0 12px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3)';
                cell.innerText = "";
            });
        }

        function resetOptions() {
            availableIndices = breakfastItems.map((_, i) => i);
            renderList();
            closeModal();
        }

        function createConfetti(color) {
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = '50vw';
                conf.style.top = '50vh';
                conf.style.backgroundColor = color;
                conf.style.borderRadius = '2px';
                document.body.appendChild(conf);
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 250;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                conf.animate([
                    { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], { duration: 1200 + Math.random() * 800, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }).onfinish = () => conf.remove();
            }
        }

        renderList();
    </script>
</body>
</html>
