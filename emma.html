<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>女兒的喵喵早餐輪盤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            background-color: #ffeef2;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        /* 確保外層容器水平置中 */
        .main-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 16px;
        }

        .canvas-container {
            position: relative;
            width: 85vw; 
            max-width: 380px;
            aspect-ratio: 1 / 1;
            margin: 0 auto; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            display: block;
        }

        /* 貓咪指針絕對置中 */
        .pointer-container {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 60px;
            pointer-events: none;
        }

        .cat-pointer {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .cute-button {
            background: linear-gradient(135deg, #ff9aaf 0%, #ffc1cc 100%);
            box-shadow: 0 8px 20px rgba(255, 154, 175, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: manipulation;
        }

        .card {
            background: #ffffff;
            border: 4px solid #ffdee7;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(255, 174, 188, 0.15);
            width: 100%;
        }

        .list-item {
            background: #fffafa;
            border: 2px solid #ffe5ec;
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .scale-in {
            animation: scaleIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="max-w-6xl w-full flex flex-col lg:flex-row gap-6 items-start justify-center">
            
            <!-- 輪盤主體區 -->
            <div class="card p-5 md:p-10 flex flex-col items-center">
                <h1 class="text-2xl md:text-4xl font-bold text-pink-400 mb-1 tracking-widest text-center" style="font-family: 'ZCOOL KuaiLe', sans-serif;">🐾 喵喵早餐輪盤 🐾</h1>
                <p class="text-pink-300 mb-8 text-sm md:text-base font-medium text-center">今天想吃哪一個呢？喵～</p>
                
                <div class="canvas-container mb-10">
                    <div class="pointer-container">
                        <svg viewBox="0 0 100 100" class="cat-pointer">
                            <circle cx="50" cy="50" r="40" fill="white" stroke="#ffb3c1" stroke-width="3"/>
                            <path d="M25 25 L15 5 L40 15 Z" fill="white" stroke="#ffb3c1" stroke-width="2"/>
                            <path d="M75 25 L85 5 L60 15 Z" fill="white" stroke="#ffb3c1" stroke-width="2"/>
                            <circle cx="35" cy="45" r="3" fill="#555"/>
                            <circle cx="65" cy="45" r="3" fill="#555"/>
                            <path d="M45 55 Q50 60 55 55" fill="none" stroke="#ffb3c1" stroke-width="2"/>
                            <path d="M50 85 L40 100 L60 100 Z" fill="#ff9aaf" />
                        </svg>
                    </div>
                    <canvas id="wheelCanvas" width="800" height="800"></canvas>
                </div>

                <button id="spinBtn" class="cute-button text-white font-black py-4 px-12 md:py-5 md:px-16 rounded-full text-xl md:text-3xl mb-2 tracking-wider w-full sm:w-auto">
                    開始旋轉！
                </button>
            </div>

            <!-- 管理清單 -->
            <div class="w-full lg:w-2/5 flex flex-col gap-4">
                <div class="card p-6">
                    <h2 class="text-xl font-bold text-pink-500 mb-4 flex items-center gap-2">
                        <span class="bg-pink-100 p-2 rounded-full text-sm">🍳</span> 選項名單
                    </h2>
                    <ul id="activeList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3 mb-6">
                        <!-- JS 生成 -->
                    </ul>
                    
                    <div class="h-0.5 bg-pink-50 rounded-full mb-6"></div>
                    
                    <h2 class="text-lg font-bold text-gray-300 mb-3 flex items-center gap-2">
                        <span class="grayscale text-sm">😸</span> 已經轉到了
                    </h2>
                    <ul id="removedList" class="space-y-2">
                        <!-- JS 生成 -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 中獎彈窗 -->
    <div id="modal" class="fixed inset-0 bg-pink-200/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[32px] p-8 max-w-sm w-full text-center shadow-2xl border-4 border-pink-100 scale-in">
            <canvas id="modalCatCanvas" width="150" height="150" class="mx-auto mb-2"></canvas>
            <h3 class="text-xl font-bold text-pink-400 mb-1">喵！決定了！</h3>
            <p id="modalMsg" class="text-2xl text-gray-700 font-black mb-6"></p>
            <div class="flex flex-col gap-3">
                <button onclick="confirmRemoval()" class="bg-pink-400 text-white font-bold py-4 rounded-2xl hover:bg-pink-500 transition shadow-lg active:scale-95">
                    太棒了，就吃這個！
                </button>
                <button onclick="closeModal()" class="bg-gray-100 text-gray-500 font-bold py-3 rounded-2xl hover:bg-gray-200 transition active:scale-95">
                    喵～想再轉一次
                </button>
            </div>
        </div>
    </div>

    <script>
        function drawCat(ctx, x, y, size, breakfastType) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = "white";
            ctx.strokeStyle = "#ffdee7";
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            ctx.ellipse(0, 0, size, size*0.8, 0, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-size*0.6, -size*0.5); ctx.lineTo(-size*0.8, -size); ctx.lineTo(-size*0.2, -size*0.7);
            ctx.fill(); ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(size*0.6, -size*0.5); ctx.lineTo(size*0.8, -size); ctx.lineTo(size*0.2, -size*0.7);
            ctx.fill(); ctx.stroke();

            ctx.fillStyle = "#444";
            ctx.beginPath(); ctx.arc(-size*0.3, -size*0.1, size*0.08, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(size*0.3, -size*0.1, size*0.08, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = "#ffcad4";
            ctx.globalAlpha = 0.6;
            ctx.beginPath(); ctx.arc(-size*0.5, size*0.1, size*0.15, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(size*0.5, size*0.1, size*0.15, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;

            ctx.strokeStyle = "#ff9aaf";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0.1, size*0.1, 0, Math.PI); ctx.stroke();

            ctx.font = `${size}px serif`;
            ctx.textAlign = "center";
            let icon = "🥯";
            if(breakfastType === "鮪魚蛋吐司") icon = "🥪";
            if(breakfastType === "肉鬆蛋吐司") icon = "🍞";
            if(breakfastType === "穀片") icon = "🥣";
            if(breakfastType === "葡萄乾吐司") icon = "🍇";
            if(breakfastType === "地瓜") icon = "🍠";
            if(breakfastType === "小叮噹蛋糕") icon = "🎂";
            
            if(breakfastType) ctx.fillText(icon, 0, size * 0.8);

            ctx.restore();
        }

        const optionsBase = ["貝果", "鮪魚蛋吐司", "肉鬆蛋吐司", "穀片", "葡萄乾吐司", "地瓜", "小叮噹蛋糕"];
        let options = [...optionsBase];
        let removedOptions = [];
        let currentRotation = 0;
        let isSpinning = false;
        let selectedIndex = -1;

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const activeListEl = document.getElementById('activeList');
        const removedListEl = document.getElementById('removedList');
        const modal = document.getElementById('modal');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, dur) {
            try {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function drawWheel() {
            const size = canvas.width;
            const center = size / 2;
            const radius = center - 40;
            ctx.clearRect(0, 0, size, size);

            if (options.length === 0) {
                ctx.fillStyle = "#ffdee7";
                ctx.beginPath(); ctx.arc(center, center, radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#ff9aaf";
                ctx.font = "bold 40px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("請復原喵喵～", center, center);
                return;
            }

            const arcSize = (Math.PI * 2) / options.length;
            options.forEach((opt, i) => {
                const angle = i * arcSize;
                ctx.fillStyle = i % 2 === 0 ? "#ffffff" : "#fff0f3";
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, angle, angle + arcSize);
                ctx.fill();
                ctx.strokeStyle = "#ffdee7";
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angle + arcSize / 2);
                drawCat(ctx, radius * 0.65, 0, 40, opt); // 選項變多，貓咪稍微縮小一點
                ctx.rotate(Math.PI / 2);
                ctx.fillStyle = "#ff8fa3";
                ctx.font = options.length > 8 ? "bold 24px sans-serif" : "bold 28px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(opt, 0, -radius * 0.35);
                ctx.restore();
            });

            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(center, center, 80, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#ffdee7";
            ctx.lineWidth = 6;
            ctx.stroke();
            drawCat(ctx, center, center, 45, "");
        }

        function spin() {
            if (isSpinning || options.length === 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            isSpinning = true;
            const duration = 4000;
            const extraSpins = 8 + Math.random() * 5;
            const totalRotation = extraSpins * 360 + Math.random() * 360;
            
            currentRotation += totalRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            let ticks = 0;
            const interval = setInterval(() => {
                if(!isSpinning) return;
                playSfx(600 + (ticks % 5 * 100), 'sine', 0.1);
                ticks++;
            }, 150);

            setTimeout(() => {
                clearInterval(interval);
                isSpinning = false;
                const actual = (currentRotation % 360);
                const arc = 360 / options.length;
                const adjusted = (360 - actual + 270) % 360;
                selectedIndex = Math.floor(adjusted / arc) % options.length;
                
                playSfx(800, 'triangle', 0.3);
                playSfx(1000, 'triangle', 0.5);
                showResult(options[selectedIndex]);
            }, duration);
        }

        function showResult(item) {
            document.getElementById('modalMsg').innerText = item;
            const mCanvas = document.getElementById('modalCatCanvas');
            const mCtx = mCanvas.getContext('2d');
            mCtx.clearRect(0,0,150,150);
            drawCat(mCtx, 75, 75, 50, item);
            modal.classList.remove('hidden');
        }

        function closeModal() { modal.classList.add('hidden'); }

        function confirmRemoval() {
            if (selectedIndex !== -1) {
                removedOptions.push(options.splice(selectedIndex, 1)[0]);
                selectedIndex = -1;
                drawWheel(); updateLists(); closeModal();
            }
        }

        function restoreItem(index) {
            options.push(removedOptions.splice(index, 1)[0]);
            drawWheel(); updateLists();
        }

        function updateLists() {
            activeListEl.innerHTML = options.map(item => 
                `<li class="list-item flex items-center gap-3 p-3 rounded-2xl shadow-sm">
                    <span class="text-2xl">🐱</span>
                    <span class="font-bold text-gray-600 text-base">${item}</span>
                </li>`
            ).join('');

            removedListEl.innerHTML = removedOptions.map((item, index) => 
                `<li class="flex justify-between items-center bg-white/50 p-2 px-4 rounded-xl text-gray-300">
                    <span class="line-through text-sm">${item}</span>
                    <button onclick="restoreItem(${index})" class="text-xs bg-pink-50 text-pink-400 px-3 py-1 rounded-full border border-pink-100 active:bg-pink-100">復原</button>
                </li>`
            ).join('');
        }

        spinBtn.addEventListener('click', spin);
        window.onload = () => { drawWheel(); updateLists(); };
    </script>
</body>
</html>
