<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早餐選擇器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="shared/style.css">
    <style>
        body[data-user="chris"] {
            background-color: #121212;
            color: white;
            font-family: 'Noto Sans TC', sans-serif;
            padding: 1rem;
            padding-top: 1.5rem;
        }
        @media (min-width: 640px) {
            body[data-user="chris"] {
                padding: 1.5rem;
                padding-top: 2rem;
            }
        }
        body[data-user="emma"] {
            background-color: #ffeef2;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            padding: 0;
        }
        body[data-user="shower"] {
            background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            padding: 1rem;
            padding-top: 1.5rem;
        }

        /* ========== Shower-only ========== */
        .shower-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            border: 4px solid #bae6fd;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.18);
        }
        .shower-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: #0284c7;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }
        .shower-subtitle {
            font-size: 0.8rem;
            color: #0ea5e9;
            text-align: center;
            margin-bottom: 14px;
            font-weight: 600;
        }
        .shower-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            min-height: 84px;
            padding: 10px;
            background: #f0f9ff;
            border: 2px dashed #bae6fd;
            border-radius: 16px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }
        .shower-pool.drag-over {
            background: #fef3c7;
            border-color: #fbbf24;
        }
        .shower-pool-empty {
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .shower-slots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .shower-slot {
            height: 94px;
            background: white;
            border: 2px dashed #bae6fd;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            position: relative;
            transition: all 0.2s ease;
        }
        .shower-slot.filled {
            background: #f0f9ff;
            border-style: solid;
            border-color: #0ea5e9;
        }
        .shower-slot.drag-over {
            background: #fef3c7;
            border-color: #fbbf24;
            transform: scale(1.04);
        }
        .shower-slot-num {
            position: absolute;
            top: 5px;
            left: 8px;
            font-size: 0.8rem;
            font-weight: 900;
            color: #94a3b8;
            line-height: 1;
        }
        .shower-slot.filled .shower-slot-num { color: #0ea5e9; }
        .shower-slot-hint {
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 600;
        }
        .shower-piece {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: grab;
            touch-action: none;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        .shower-piece:active { cursor: grabbing; }
        .shower-piece.dragging { opacity: 0.3; }
        .shower-piece-avatar, .shower-piece-avatar img {
            -webkit-touch-callout: none;
        }
        .shower-piece-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            border: 3px solid white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.18);
            overflow: hidden;
        }
        .shower-piece-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        .shower-piece-name {
            font-size: 0.7rem;
            font-weight: 800;
            color: #475569;
        }
        .shower-drag-ghost {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            transition: none;
        }
        #showerLadder {
            width: 100%;
            height: auto;
            display: block;
        }
        .shower-start-btn {
            width: 100%;
            margin-top: 14px;
            padding: 16px;
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: white;
            font-weight: 900;
            font-size: 1.15rem;
            border: none;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(14, 165, 233, 0.4);
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s ease;
        }
        .shower-start-btn:active { transform: scale(0.98); }
        .shower-start-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .shower-result-card {
            margin-top: 14px;
            padding: 14px;
            background: #f0f9ff;
            border-radius: 18px;
            border: 2px solid #bae6fd;
        }
        .shower-result-title {
            text-align: center;
            font-weight: 900;
            color: #0369a1;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .shower-result-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 12px;
            margin-bottom: 6px;
            background: white;
            border: 1px solid #e0f2fe;
        }
        .shower-result-row.rank-1 {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #fbbf24;
        }
        .shower-rank-num {
            font-weight: 900;
            min-width: 28px;
            text-align: center;
            font-size: 1.1rem;
            color: #0369a1;
        }
        .shower-result-row.rank-1 .shower-rank-num { color: #b45309; }
        .shower-result-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            overflow: hidden;
            flex-shrink: 0;
        }
        .shower-result-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .shower-result-name {
            font-weight: 800;
            color: #1e293b;
        }
        .shower-hint {
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        /* ========== Chris-only ========== */
        .cube-container {
            width: min(300px, calc(100vw - 2.5rem));
            height: min(300px, calc(100vw - 2.5rem));
            padding: 12px;
            background: #1a1a1a;
            border: 4px solid #333;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            overflow: hidden;
            position: relative;
        }
        .cube-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .cube-cell {
            background-color: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            color: #000;
            text-align: center;
            transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
            position: relative;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .option-tag {
            transition: all 0.3s ease;
        }
        .option-tag.removed {
            opacity: 0.2;
            text-decoration: line-through;
            transform: scale(0.9);
            filter: grayscale(1);
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 100;
            pointer-events: none;
        }

        /* ========== Emma-only ========== */
        .main-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #emmaWheelCanvas {
            width: 100%;
            height: 100%;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            display: block;
        }
        .pointer-container {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 60px;
            pointer-events: none;
        }
        .cat-pointer {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        .cute-button {
            background: linear-gradient(135deg, #ff9aaf 0%, #ffc1cc 100%);
            box-shadow: 0 8px 20px rgba(255, 154, 175, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: manipulation;
        }
        .panel-card {
            background: #ffffff;
            border: 4px solid #ffdee7;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(255, 174, 188, 0.15);
            width: 100%;
        }
        .list-item {
            background: #fffafa;
            border: 2px solid #ffe5ec;
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .scale-in {
            animation: scaleIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body data-user="chris">

    <!-- User toggle (populated by app.js) -->

    <!-- ================= Chris ================= -->

    <div class="chris-only mb-8 w-full max-w-sm">

    <!-- ================= Shower ================= -->
    <div class="shower-only shower-container">
        <h1 class="shower-title">🛁 洗澡爬格子</h1>
        <p class="shower-subtitle">把頭像拖到下方 1 / 2 / 3 / 4 起跑點～</p>

        <div id="showerInteractive">
            <div class="shower-pool" id="showerPool"></div>
            <div class="shower-slots" id="showerSlots"></div>
        </div>
        <svg id="showerLadder" viewBox="0 0 360 420" xmlns="http://www.w3.org/2000/svg"></svg>

        <button id="showerStartBtn" class="shower-start-btn" onclick="showerButtonAction()" disabled>還缺 4 個就位</button>

    <script src="meals.js"></script>
    <script type="module" src="app.js"></script>
    <script>
        // ========== Shared audio ==========
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // ========== State ==========
        const CHRIS_PALETTE = ["#DC2626", "#16A34A", "#2563EB", "#CA8A04", "#EA580C"];
        const state = {
            chris: {
                breakfastItems: MEALS.chris.map((text, i) => ({
                    text,
                    color: CHRIS_PALETTE[i % CHRIS_PALETTE.length]
                })),
                availableIndices: MEALS.chris.map((_, i) => i),
                isProcessing: false
            },
            emma: {
                options: [...MEALS.emma],
                removedOptions: [],
                currentRotation: 0,
                isSpinning: false,
                selectedIndex: -1
            }
        };

        // ========== Chris ==========
        function chrisPlaySound(type) {
            initAudio();
            const startTime = audioCtx.currentTime;

            if (type === 'tick') {
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(120, startTime);
                osc1.frequency.linearRampToValueAtTime(40, startTime + 0.08);
                gain1.gain.setValueAtTime(0.08, startTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, startTime + 0.08);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start(startTime);
                osc1.stop(startTime + 0.08);

                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(800, startTime);
                gain2.gain.setValueAtTime(0.02, startTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, startTime + 0.04);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start(startTime);
                osc2.stop(startTime + 0.04);

            } else if (type === 'win') {
                [440, 554, 659, 880].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, startTime + i * 0.08);
                    gain.gain.setValueAtTime(0.1, startTime + i * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + i * 0.08 + 0.3);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime + i * 0.08);
                    osc.stop(startTime + i * 0.08 + 0.4);
                });
            }
        }

        function chrisRenderList() {
            const listContainer = document.getElementById('chrisStatusList');
            listContainer.innerHTML = '';
            state.chris.breakfastItems.forEach((item, idx) => {
                const isRemoved = !state.chris.availableIndices.includes(idx);
                const span = document.createElement('div');
                span.className = `option-tag px-3 py-1.5 rounded-full border text-xs font-bold flex items-center gap-2 ${isRemoved ? 'removed bg-gray-800/20 border-gray-800 text-gray-600' : 'bg-gray-800 border-gray-700 text-white'}`;
                span.innerHTML = `<div class="w-2 h-2 rounded-full shadow-[0_0_5px_rgba(255,255,255,0.2)]" style="background-color: ${item.color}"></div>${item.text}`;
                listContainer.appendChild(span);
            });
        }

        function chrisMoveCube() {
            const isRow = Math.random() > 0.5;
            const index = Math.floor(Math.random() * 3);
            const direction = Math.random() > 0.5 ? 1 : -1;

            const cellElements = [];
            if (isRow) {
                for (let i = 0; i < 3; i++) cellElements.push(document.getElementById(`chris-cell-${index * 3 + i}`));
            } else {
                for (let i = 0; i < 3; i++) cellElements.push(document.getElementById(`chris-cell-${index + i * 3}`));
            }

            chrisPlaySound('tick');

            cellElements.forEach(el => {
                const moveVal = direction * 105;
                el.style.transform = isRow ? `translateX(${moveVal}%)` : `translateY(${moveVal}%)`;
            });

            setTimeout(() => {
                cellElements.forEach(el => {
                    el.style.transition = 'none';
                    el.style.transform = 'translate(0,0)';
                    const randomItemIdx = Math.floor(Math.random() * state.chris.breakfastItems.length);
                    el.style.backgroundColor = state.chris.breakfastItems[randomItemIdx].color;
                    setTimeout(() => el.style.transition = 'transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s', 10);
                });
            }, 180);
        }

        function chrisStartSelection() {
            if (state.chris.isProcessing || state.chris.availableIndices.length === 0) return;
            state.chris.isProcessing = true;

            let count = 0;
            const maxMoves = 18;
            const interval = setInterval(() => {
                chrisMoveCube();
                count++;
                if (count >= maxMoves) {
                    clearInterval(interval);
                    setTimeout(chrisFinalizeSelection, 400);
                }
            }, 220);
        }

        // ========== Emma ==========
        function emmaDrawCat(ctx, x, y, size, breakfastType) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = "white";
            ctx.strokeStyle = "#ffdee7";
            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.ellipse(0, 0, size, size*0.8, 0, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-size*0.6, -size*0.5); ctx.lineTo(-size*0.8, -size); ctx.lineTo(-size*0.2, -size*0.7);
            ctx.fill(); ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(size*0.6, -size*0.5); ctx.lineTo(size*0.8, -size); ctx.lineTo(size*0.2, -size*0.7);
            ctx.fill(); ctx.stroke();

            ctx.fillStyle = "#444";
            ctx.beginPath(); ctx.arc(-size*0.3, -size*0.1, size*0.08, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(size*0.3, -size*0.1, size*0.08, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = "#ffcad4";
            ctx.globalAlpha = 0.6;
            ctx.beginPath(); ctx.arc(-size*0.5, size*0.1, size*0.15, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(size*0.5, size*0.1, size*0.15, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;

            ctx.strokeStyle = "#ff9aaf";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0.1, size*0.1, 0, Math.PI); ctx.stroke();

            ctx.font = `${size}px serif`;
            ctx.textAlign = "center";
            let icon = "🥯";
            if(breakfastType === "鮪魚蛋吐司") icon = "🥪";
            if(breakfastType === "肉鬆蛋吐司") icon = "🍞";
            if(breakfastType === "穀片") icon = "🥣";
            if(breakfastType === "葡萄乾吐司") icon = "🍇";
            if(breakfastType === "地瓜") icon = "🍠";
            if(breakfastType === "小叮噹蛋糕") icon = "🎂";

            if(breakfastType) ctx.fillText(icon, 0, size * 0.8);

            ctx.restore();
        }

        const emmaCanvas = document.getElementById('emmaWheelCanvas');
        const emmaCtx = emmaCanvas.getContext('2d');
        const emmaSpinBtn = document.getElementById('emmaSpinBtn');

        function emmaPlaySfx(freq, type, dur) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        const emmaMeowAudio = new Audio('cat-meow.mp3');
        emmaMeowAudio.preload = 'auto';
        emmaMeowAudio.volume = 0.5;

        function emmaDrawWheel() {
            const size = emmaCanvas.width;
            const center = size / 2;
            const radius = center - 40;
            emmaCtx.clearRect(0, 0, size, size);

            if (state.emma.options.length === 0) {
                emmaCtx.fillStyle = "#ffdee7";
                emmaCtx.beginPath(); emmaCtx.arc(center, center, radius, 0, Math.PI*2); emmaCtx.fill();
                emmaCtx.fillStyle = "#ff9aaf";
                emmaCtx.font = "bold 40px sans-serif";
                emmaCtx.textAlign = "center";
                emmaCtx.fillText("請復原喵喵～", center, center);
                return;
            }

            const arcSize = (Math.PI * 2) / state.emma.options.length;
            state.emma.options.forEach((opt, i) => {
                const angle = i * arcSize;
                emmaCtx.fillStyle = i % 2 === 0 ? "#ffffff" : "#fff0f3";
                emmaCtx.beginPath();
                emmaCtx.moveTo(center, center);
                emmaCtx.arc(center, center, radius, angle, angle + arcSize);
                emmaCtx.fill();
                emmaCtx.strokeStyle = "#ffdee7";
                emmaCtx.lineWidth = 4;
                emmaCtx.stroke();

                emmaCtx.save();
                emmaCtx.translate(center, center);
                emmaCtx.rotate(angle + arcSize / 2);
                emmaDrawCat(emmaCtx, radius * 0.65, 0, 40, opt);
                emmaCtx.rotate(Math.PI / 2);
                emmaCtx.fillStyle = "#ff8fa3";
                emmaCtx.font = state.emma.options.length > 8 ? "bold 24px sans-serif" : "bold 28px sans-serif";
                emmaCtx.textAlign = "center";
                emmaCtx.fillText(opt, 0, -radius * 0.35);
                emmaCtx.restore();
            });

            emmaCtx.fillStyle = "white";
            emmaCtx.beginPath(); emmaCtx.arc(center, center, 80, 0, Math.PI*2); emmaCtx.fill();
            emmaCtx.strokeStyle = "#ffdee7";
            emmaCtx.lineWidth = 6;
            emmaCtx.stroke();
            emmaDrawCat(emmaCtx, center, center, 45, "");
        }

        function emmaSpin() {
            if (state.emma.isSpinning || state.emma.options.length === 0) return;
            initAudio();

            state.emma.isSpinning = true;
            const duration = 4000;
            const extraSpins = 8 + Math.random() * 5;
            const totalRotation = extraSpins * 360 + Math.random() * 360;

            state.emma.currentRotation += totalRotation;
            emmaCanvas.style.transform = `rotate(${state.emma.currentRotation}deg)`;

            let ticks = 0;
            const interval = setInterval(() => {
                if(!state.emma.isSpinning) return;
                emmaPlaySfx(600 + (ticks % 5 * 100), 'sine', 0.1);
                ticks++;
            }, 150);

            setTimeout(() => {
                clearInterval(interval);
                state.emma.isSpinning = false;
                const actual = (state.emma.currentRotation % 360);
                const arc = 360 / state.emma.options.length;
                const adjusted = (360 - actual + 270) % 360;
                state.emma.selectedIndex = Math.floor(adjusted / arc) % state.emma.options.length;

                emmaPlayMeow();
                emmaShowResult(state.emma.options[state.emma.selectedIndex]);
            }, duration);

        // ========== Shower ==========
        const SHOWER_CONFIG = {
            cols: 4,
            levels: 14,
            width: 360,
            height: 420,
            avatarY: 24,
            avatarR: 20,
            bottomPad: 24
        };

        let showerGeom = null;
        const showerState = {
            rungs: [],
            isRunning: false,
            hasPlayed: false,
            avatarEls: [],
            pool: [0, 1, 2, 3],
            slots: [null, null, null, null],
            drag: null
        };

        function showerComputeGeom() {
            const colSpacing = SHOWER_CONFIG.width / SHOWER_CONFIG.cols;
            const colXs = [];
            for (let i = 0; i < SHOWER_CONFIG.cols; i++) {
                colXs.push(colSpacing / 2 + i * colSpacing);
            }
            const lineTopY = SHOWER_CONFIG.avatarY;
            const lineBottomY = SHOWER_CONFIG.height - SHOWER_CONFIG.bottomPad;
            const rungSpacing = (lineBottomY - lineTopY) / (SHOWER_CONFIG.levels + 1);
            const rungYs = [];
            for (let i = 0; i < SHOWER_CONFIG.levels; i++) {
                rungYs.push(lineTopY + (i + 1) * rungSpacing);
            }
            showerGeom = { colXs, rungYs, lineTopY, lineBottomY };
        }

        function showerGenerateRungs() {
            const rungs = [];
            const numGaps = SHOWER_CONFIG.cols - 1;
            for (let l = 0; l < SHOWER_CONFIG.levels; l++) {
                const row = new Array(numGaps).fill(false);
                for (let g = 0; g < numGaps; g++) {
                    if (g > 0 && row[g - 1]) continue;
                    if (Math.random() < 0.5) row[g] = true;
                }
                rungs.push(row);
            }
            showerState.rungs = rungs;
        }

        function showerDrawLadder(withAvatars = false) {
            const svg = document.getElementById('showerLadder');
            const { colXs, rungYs, lineTopY, lineBottomY } = showerGeom;
            const parts = [];
            colXs.forEach(x => {
                parts.push(`<line x1="${x}" y1="${lineTopY}" x2="${x}" y2="${lineBottomY}" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round"/>`);
            });
            showerState.rungs.forEach((row, l) => {
                row.forEach((on, g) => {
                    if (on) {
                        const y = rungYs[l];
                        parts.push(`<line x1="${colXs[g]}" y1="${y}" x2="${colXs[g+1]}" y2="${y}" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round"/>`);
                    }
                });
            });
            if (withAvatars) {
                parts.push('<defs><clipPath id="showerCircleClip" clipPathUnits="objectBoundingBox"><circle cx="0.5" cy="0.5" r="0.5"/></clipPath></defs>');
                for (let i = 0; i < SHOWER_CONFIG.cols; i++) {
                    const personIdx = showerState.slots[i];
                    if (personIdx === null) continue;
                    const p = SHOWER_PEOPLE[personIdx];
                    const x = colXs[i];
                    const y = SHOWER_CONFIG.avatarY;
                    const r = SHOWER_CONFIG.avatarR;
                    parts.push(`<g class="shower-avatar" data-idx="${i}">
                        <image href="${p.image}" x="${x-r}" y="${y-r}" width="${2*r}" height="${2*r}" preserveAspectRatio="xMidYMid slice" clip-path="url(#showerCircleClip)"/>
                        <circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="white" stroke-width="3"/>
                    </g>`);
                }
            }
            svg.innerHTML = parts.join('');
            showerState.avatarEls = svg.querySelectorAll('.shower-avatar');
        }

        function showerRenderPool() {
            const el = document.getElementById('showerPool');
            if (showerState.pool.length === 0) {
                el.innerHTML = '<div class="shower-pool-empty">全員就位 ✨</div>';
                return;
            }
            el.innerHTML = showerState.pool.map(idx => {
                const p = SHOWER_PEOPLE[idx];
                return `
                    <div class="shower-piece" data-person-idx="${idx}">
                        <div class="shower-piece-avatar" style="background-color:${p.color}"><img src="${p.image}" alt="${p.name}" draggable="false"></div>
                        <div class="shower-piece-name">${p.name}</div>

        }

        function showerRenderSlots() {
            document.getElementById('showerSlots').innerHTML = showerState.slots.map((personIdx, slotIdx) => {

                if (personIdx === null) {
                    return `
                        <div class="shower-slot" data-slot="${slotIdx}">
                            <div class="shower-slot-num">${num}</div>
                            <div class="shower-slot-hint">拖人來</div>

                const p = SHOWER_PEOPLE[personIdx];
                return `
                    <div class="shower-slot filled" data-slot="${slotIdx}">

                            <div class="shower-piece-avatar" style="background-color:${p.color}"><img src="${p.image}" alt="${p.name}" draggable="false"></div>
                            <div class="shower-piece-name">${p.name}</div>

        function showerAllPlaced() {
            return showerState.slots.every(s => s !== null);
        }

        function showerUpdateStartBtn() {
            const btn = document.getElementById('showerStartBtn');
            if (showerState.isRunning) return;

                btn.disabled = false;

        function showerClearResults() {

        }

        function showerButtonAction() {
            if (showerState.isRunning) return;
            if (showerState.hasPlayed) {
                showerReset();
            } else {
                showerStart();
            }
        }

        function showerReset() {
            showerState.pool = [0, 1, 2, 3];
            showerState.slots = [null, null, null, null];
            showerState.hasPlayed = false;
            showerClearResults();
            showerDrawLadder();
            showerRenderPool();
            showerRenderSlots();
            showerUpdateStartBtn();
        }

        function showerHandleDrop(personIdx, fromSlot, target) {
            if (!target) return;
            if (target.type === 'slot') {
                const tIdx = target.idx;
                const existing = showerState.slots[tIdx];
                if (existing === personIdx) return;
                if (fromSlot === -1) {
                    const i = showerState.pool.indexOf(personIdx);
                    if (i >= 0) showerState.pool.splice(i, 1);
                } else {
                    showerState.slots[fromSlot] = null;
                }
                if (existing !== null) {
                    if (fromSlot !== -1) {
                        showerState.slots[fromSlot] = existing;
                    } else {
                        showerState.pool.push(existing);
                    }
                }
                showerState.slots[tIdx] = personIdx;
            } else if (target.type === 'pool') {
                if (fromSlot === -1) return;
                showerState.slots[fromSlot] = null;
                showerState.pool.push(personIdx);
            }
        }

        function showerOnPointerDown(e) {
            if (showerState.isRunning) return;
            const piece = e.target.closest('.shower-piece');
            if (!piece) return;
            e.preventDefault();

            const personIdx = parseInt(piece.dataset.personIdx);
            const fromSlot = piece.dataset.fromSlot !== undefined ? parseInt(piece.dataset.fromSlot) : -1;
            const rect = piece.getBoundingClientRect();
            const isTouch = e.pointerType === 'touch';
            const ghostTransform = isTouch ? 'translate(-50%, -120%) scale(1.15)' : 'translate(-50%, -50%) scale(1.1)';

            const ghost = piece.cloneNode(true);
            ghost.classList.add('shower-drag-ghost');
            ghost.style.left = (rect.left + rect.width / 2) + 'px';
            ghost.style.top = (rect.top + rect.height / 2) + 'px';
            ghost.style.transform = ghostTransform;
            ghost.style.opacity = '0.92';
            ghost.style.filter = 'drop-shadow(0 6px 12px rgba(0,0,0,0.25))';
            document.body.appendChild(ghost);

            piece.classList.add('dragging');

            try { piece.setPointerCapture(e.pointerId); } catch (err) {}

            showerState.drag = { personIdx, fromSlot, ghost, pieceEl: piece, pointerId: e.pointerId, ghostTransform };

            document.addEventListener('pointermove', showerOnPointerMove);
            document.addEventListener('pointerup', showerOnPointerUp);
            document.addEventListener('pointercancel', showerOnPointerUp);
        }

        function showerOnPointerMove(e) {
            if (!showerState.drag) return;
            if (e.pointerId !== undefined && e.pointerId !== showerState.drag.pointerId) return;
            e.preventDefault();

            const ghost = showerState.drag.ghost;
            ghost.style.left = e.clientX + 'px';
            ghost.style.top = e.clientY + 'px';

            document.querySelectorAll('.shower-slot.drag-over, .shower-pool.drag-over').forEach(el => el.classList.remove('drag-over'));
            const elAt = document.elementFromPoint(e.clientX, e.clientY);
            if (elAt) {
                const slot = elAt.closest('.shower-slot');
                const pool = elAt.closest('.shower-pool');
                if (slot) slot.classList.add('drag-over');
                else if (pool && showerState.drag.fromSlot !== -1) pool.classList.add('drag-over');
            }
        }

        function showerOnPointerUp(e) {
            if (!showerState.drag) return;
            if (e.pointerId !== undefined && e.pointerId !== showerState.drag.pointerId) return;

            const { personIdx, fromSlot, ghost, pieceEl } = showerState.drag;
            ghost.remove();
            pieceEl.classList.remove('dragging');
            document.querySelectorAll('.shower-slot.drag-over, .shower-pool.drag-over').forEach(el => el.classList.remove('drag-over'));

            const elAt = document.elementFromPoint(e.clientX, e.clientY);
            let target = null;
            if (elAt) {
                const slot = elAt.closest('.shower-slot');
                const pool = elAt.closest('.shower-pool');
                if (slot) target = { type: 'slot', idx: parseInt(slot.dataset.slot) };
                else if (pool) target = { type: 'pool' };
            }

            showerHandleDrop(personIdx, fromSlot, target);

            showerState.drag = null;
            document.removeEventListener('pointermove', showerOnPointerMove);
            document.removeEventListener('pointerup', showerOnPointerUp);
            document.removeEventListener('pointercancel', showerOnPointerUp);

            if (showerState.hasPlayed) {
                showerState.hasPlayed = false;
                showerDrawLadder();
            }
            showerRenderPool();
            showerRenderSlots();
            showerClearResults();
            showerUpdateStartBtn();
        }

        function showerTracePath(startCol) {
            const { colXs, rungYs, lineBottomY } = showerGeom;
            const pts = [{ x: colXs[startCol], y: SHOWER_CONFIG.avatarY }];
            let col = startCol;
            for (let l = 0; l < SHOWER_CONFIG.levels; l++) {
                const y = rungYs[l];
                if (col > 0 && showerState.rungs[l][col - 1]) {
                    pts.push({ x: colXs[col], y });
                    col -= 1;
                    pts.push({ x: colXs[col], y });
                } else if (col < SHOWER_CONFIG.cols - 1 && showerState.rungs[l][col]) {
                    pts.push({ x: colXs[col], y });
                    col += 1;
                    pts.push({ x: colXs[col], y });
                }
            }
            pts.push({ x: colXs[col], y: lineBottomY });
            return { points: pts, finalCol: col };
        }

        function showerAnimateAvatar(el, points, totalDur) {
            const image = el.querySelector('image');
            const circle = el.querySelector('circle');
            const r = SHOWER_CONFIG.avatarR;
            const setPos = (x, y) => {
                image.setAttribute('x', x - r);
                image.setAttribute('y', y - r);
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
            };

            let totalLen = 0;
            const segLens = [];
            for (let i = 1; i < points.length; i++) {
                const dx = points[i].x - points[i-1].x;
                const dy = points[i].y - points[i-1].y;
                const len = Math.sqrt(dx*dx + dy*dy) || 0.001;
                segLens.push(len);
                totalLen += len;
            }
            const cum = [0];
            segLens.forEach(l => cum.push(cum[cum.length-1] + (l/totalLen) * totalDur));

            return new Promise(resolve => {
                const start = performance.now();
                function frame(now) {
                    const elapsed = now - start;
                    if (elapsed >= totalDur) {
                        const last = points[points.length-1];
                        setPos(last.x, last.y);
                        return resolve();
                    }
                    let segIdx = 0;
                    for (let i = 1; i < cum.length; i++) {
                        if (elapsed < cum[i]) { segIdx = i - 1; break; }
                    }
                    const t = (elapsed - cum[segIdx]) / (cum[segIdx+1] - cum[segIdx]);
                    const from = points[segIdx];
                    const to = points[segIdx + 1];
                    setPos(from.x + (to.x - from.x) * t, from.y + (to.y - from.y) * t);
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);
            });
        }

        function showerPlayTick() {
            initAudio();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(900 + Math.random() * 400, t);
            g.gain.setValueAtTime(0.04, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.12);
        }

        function showerPlaySplash() {
            initAudio();
            const t0 = audioCtx.currentTime;
            [523, 659, 784, 1047].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sine';
                const start = t0 + i * 0.09;
                osc.frequency.setValueAtTime(freq, start);
                g.gain.setValueAtTime(0.12, start);
                g.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(start); osc.stop(start + 0.45);
            });
        }

        async function showerStart() {
            if (showerState.isRunning || !showerAllPlaced()) return;
            showerState.isRunning = true;
            initAudio();

            showerClearResults();

            const btn = document.getElementById('showerStartBtn');
            btn.disabled = true;
            btn.innerText = '爬格子中...🫧';

            showerGenerateRungs();
            showerDrawLadder(true);
            document.querySelectorAll('.shower-slot .shower-piece').forEach(p => {
                p.style.visibility = 'hidden';
            });

            await new Promise(r => setTimeout(r, 60));

            const results = [];
            const totalDur = 3200;
            const animPromises = [];
            for (let i = 0; i < SHOWER_CONFIG.cols; i++) {
                const personIdx = showerState.slots[i];
                const person = SHOWER_PEOPLE[personIdx];
                const trace = showerTracePath(i);
                results.push({ person, finalCol: trace.finalCol });
                animPromises.push(showerAnimateAvatar(showerState.avatarEls[i], trace.points, totalDur));
            }

            const tickTimer = setInterval(showerPlayTick, 180);
            await Promise.all(animPromises);
            clearInterval(tickTimer);

            showerShowResults(results);
            showerPlaySplash();

            document.querySelectorAll('.shower-slot .shower-piece').forEach(p => {
                p.style.visibility = 'visible';
            });

            showerState.isRunning = false;
            showerState.hasPlayed = true;
            showerUpdateStartBtn();
        }

        function showerShowResults(results) {
            const ranked = [...results].sort((a, b) => a.finalCol - b.finalCol);
            const card = document.getElementById('showerResultCard');
            card.innerHTML = `<div class="shower-result-title">🎉 洗澡順序公布！</div>` +
                ranked.map((r, idx) => `
                    <div class="shower-result-row rank-${idx+1}">
                        <div class="shower-rank-num">${idx+1}</div>
                        <div class="shower-result-avatar" style="background-color:${r.person.color}"><img src="${r.person.image}" alt="${r.person.name}"></div>
                        <div class="shower-result-name">${r.person.name}</div>
                    </div>
                `).join('');
            card.classList.remove('hidden');
        }

        function showerInit() {
            showerComputeGeom();
            showerGenerateRungs();
            showerDrawLadder();
            showerRenderPool();
            showerRenderSlots();
            showerUpdateStartBtn();
            document.getElementById('showerInteractive').addEventListener('pointerdown', showerOnPointerDown);
        }

        // ========== Init ==========
        chrisRenderList();
        emmaDrawWheel();
        emmaUpdateLists();
        showerInit();
    </script>
</body>
</html>
