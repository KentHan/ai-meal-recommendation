<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早餐選擇器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="shared/style.css">
    <link rel="stylesheet" href="features/chris/style.css">
    <link rel="stylesheet" href="features/emma/style.css">
    <link rel="stylesheet" href="features/shower/style.css">
</head>
<body data-user="chris">

    <!-- User toggle (populated by app.js) -->
    <div class="user-toggle"></div>

    <!-- Feature mount point (populated by app.js as features are migrated) -->
    <div id="app"></div>

    <script src="meals.js"></script>
    <script type="module" src="app.js"></script>
    <script>
        // ========== Shared audio ==========
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

    </script>
</body>
</html>
