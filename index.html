<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早餐選擇器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&family=ZCOOL+KuaiLe&display=swap');

        /* ========== Shared ========== */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body[data-user="chris"] {
            background-color: #121212;
            color: white;
            font-family: 'Noto Sans TC', sans-serif;
            padding: 1rem;
            padding-top: 1.5rem;
        }
        @media (min-width: 640px) {
            body[data-user="chris"] {
                padding: 1.5rem;
                padding-top: 2rem;
            }
        }
        body[data-user="emma"] {
            background-color: #ffeef2;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            padding: 0;
        }

        body[data-user="chris"] .emma-only { display: none !important; }
        body[data-user="emma"]  .chris-only { display: none !important; }

        /* ========== User toggle ========== */
        .user-toggle {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            border-radius: 9999px;
            margin: 0 auto 20px;
            z-index: 30;
        }
        .user-toggle button {
            padding: 8px 18px;
            border-radius: 9999px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            background: transparent;
        }
        body[data-user="chris"] .user-toggle {
            background: #1a1a1a;
            border: 2px solid #333;
        }
        body[data-user="chris"] .user-toggle button { color: #888; }
        body[data-user="chris"] .user-toggle button.active {
            background: #2563EB;
            color: white;
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.5);
        }
        body[data-user="emma"] .user-toggle {
            background: white;
            border: 2px solid #ffdee7;
            margin-top: 16px;
            box-shadow: 0 4px 12px rgba(255, 174, 188, 0.15);
        }
        body[data-user="emma"] .user-toggle button { color: #c0607a; }
        body[data-user="emma"] .user-toggle button.active {
            background: #ff9aaf;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 154, 175, 0.4);
        }

        /* ========== Chris-only ========== */
        .cube-container {
            width: min(300px, calc(100vw - 2.5rem));
            height: min(300px, calc(100vw - 2.5rem));
            padding: 12px;
            background: #1a1a1a;
            border: 4px solid #333;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            overflow: hidden;
            position: relative;
        }
        .cube-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .cube-cell {
            background-color: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            color: #000;
            text-align: center;
            transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
            position: relative;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .option-tag {
            transition: all 0.3s ease;
        }
        .option-tag.removed {
            opacity: 0.2;
            text-decoration: line-through;
            transform: scale(0.9);
            filter: grayscale(1);
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 100;
            pointer-events: none;
        }

        /* ========== Emma-only ========== */
        .main-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #emmaWheelCanvas {
            width: 100%;
            height: 100%;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            display: block;
        }
        .pointer-container {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 60px;
            pointer-events: none;
        }
        .cat-pointer {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        .cute-button {
            background: linear-gradient(135deg, #ff9aaf 0%, #ffc1cc 100%);
            box-shadow: 0 8px 20px rgba(255, 154, 175, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: manipulation;
        }
        .panel-card {
            background: #ffffff;
            border: 4px solid #ffdee7;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(255, 174, 188, 0.15);
            width: 100%;
        }
        .list-item {
            background: #fffafa;
            border: 2px solid #ffe5ec;
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .scale-in {
            animation: scaleIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body data-user="chris">

    <!-- User toggle -->
    <div class="user-toggle">
        <button data-user-btn="chris">🧊 Chris</button>
        <button data-user-btn="emma">🐱 Emma</button>
    </div>

    <!-- ================= Chris ================= -->
    <div class="chris-only text-center mb-8">
        <h1 class="text-3xl sm:text-4xl font-black italic tracking-tighter text-blue-500 mb-1">CUBE BREAKFAST</h1>
        <p class="text-gray-500 text-sm font-bold uppercase tracking-widest">兒子專屬機械魔方</p>
    </div>

    <div class="chris-only mb-8 w-full max-w-sm">
        <div class="flex justify-between items-end mb-3 px-1">
            <h2 class="text-lg font-black text-white border-b-2 border-blue-500">今日選單</h2>
            <button onclick="chrisResetOptions()" class="text-[10px] font-bold text-gray-400 border border-gray-700 px-2 py-1 rounded hover:bg-gray-800 transition">重置進度</button>
        </div>
        <div id="chrisStatusList" class="flex flex-wrap gap-2 justify-center"></div>
    </div>

    <div class="chris-only cube-container mb-6" id="chrisCubeTrigger" onclick="chrisStartSelection()">
        <div id="chrisCubeGrid" class="cube-grid cursor-pointer">
            <div id="chris-cell-0" class="cube-cell bg-red-600"></div>
            <div id="chris-cell-1" class="cube-cell bg-blue-600"></div>
            <div id="chris-cell-2" class="cube-cell bg-green-600"></div>
            <div id="chris-cell-3" class="cube-cell bg-orange-600"></div>
            <div id="chris-cell-4" class="cube-cell bg-yellow-500"></div>
            <div id="chris-cell-5" class="cube-cell bg-slate-100"></div>
            <div id="chris-cell-6" class="cube-cell bg-red-600"></div>
            <div id="chris-cell-7" class="cube-cell bg-blue-600"></div>
            <div id="chris-cell-8" class="cube-cell bg-green-600"></div>
        </div>
    </div>
    <p class="chris-only text-center text-gray-600 text-xs font-bold animate-bounce">點擊方塊啟動引擎！</p>

    <div id="chrisModal" class="chris-only fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden p-6 backdrop-blur-md">
        <div class="bg-gray-900 border-2 border-blue-500 p-8 rounded-2xl text-center max-w-sm w-full shadow-[0_0_50px_rgba(59,130,246,0.3)]">
            <div id="chrisModalColorStrip" class="h-2 w-16 mx-auto rounded-full mb-6"></div>
            <p class="text-gray-400 font-bold mb-2 tracking-widest text-xs uppercase">Target Acquired</p>
            <h3 id="chrisResultText" class="text-4xl font-black mb-8 text-white tracking-tight"></h3>
            <button onclick="chrisCloseModal()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-500 transition text-lg shadow-lg">準備開動</button>
        </div>
    </div>

    <!-- ================= Emma ================= -->
    <div class="emma-only main-wrapper">
        <div class="max-w-6xl w-full flex flex-col lg:flex-row gap-6 items-start justify-center">

            <div class="panel-card p-5 md:p-10 flex flex-col items-center">
                <h1 class="text-2xl md:text-4xl font-bold text-pink-400 mb-1 tracking-widest text-center" style="font-family: 'ZCOOL KuaiLe', sans-serif;">🐾 喵喵早餐輪盤 🐾</h1>
                <p class="text-pink-300 mb-8 text-sm md:text-base font-medium text-center">今天想吃哪一個呢？喵～</p>

                <div class="canvas-container mb-6 sm:mb-10">
                    <div class="pointer-container">
                        <svg viewBox="0 0 100 100" class="cat-pointer">
                            <circle cx="50" cy="50" r="40" fill="white" stroke="#ffb3c1" stroke-width="3"/>
                            <path d="M25 25 L15 5 L40 15 Z" fill="white" stroke="#ffb3c1" stroke-width="2"/>
                            <path d="M75 25 L85 5 L60 15 Z" fill="white" stroke="#ffb3c1" stroke-width="2"/>
                            <circle cx="35" cy="45" r="3" fill="#555"/>
                            <circle cx="65" cy="45" r="3" fill="#555"/>
                            <path d="M45 55 Q50 60 55 55" fill="none" stroke="#ffb3c1" stroke-width="2"/>
                            <path d="M50 85 L40 100 L60 100 Z" fill="#ff9aaf" />
                        </svg>
                    </div>
                    <canvas id="emmaWheelCanvas" width="800" height="800"></canvas>
                </div>

                <button id="emmaSpinBtn" class="cute-button text-white font-black py-4 px-12 md:py-5 md:px-16 rounded-full text-xl md:text-3xl mb-2 tracking-wider w-full sm:w-auto">
                    開始旋轉！
                </button>
            </div>

            <div class="w-full lg:w-2/5 flex flex-col gap-4">
                <div class="panel-card p-6">
                    <h2 class="text-xl font-bold text-pink-500 mb-4 flex items-center gap-2">
                        <span class="bg-pink-100 p-2 rounded-full text-sm">🍳</span> 選項名單
                    </h2>
                    <ul id="emmaActiveList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3 mb-6"></ul>

                    <div class="h-0.5 bg-pink-50 rounded-full mb-6"></div>

                    <h2 class="text-lg font-bold text-gray-300 mb-3 flex items-center gap-2">
                        <span class="grayscale text-sm">😸</span> 已經轉到了
                    </h2>
                    <ul id="emmaRemovedList" class="space-y-2"></ul>
                </div>
            </div>
        </div>
    </div>

    <div id="emmaModal" class="emma-only fixed inset-0 bg-pink-200/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[32px] p-8 max-w-sm w-full text-center shadow-2xl border-4 border-pink-100 scale-in">
            <canvas id="emmaModalCatCanvas" width="150" height="150" class="mx-auto mb-2"></canvas>
            <h3 class="text-xl font-bold text-pink-400 mb-1">喵！決定了！</h3>
            <p id="emmaModalMsg" class="text-2xl text-gray-700 font-black mb-6"></p>
            <div class="flex flex-col gap-3">
                <button onclick="emmaConfirmRemoval()" class="bg-pink-400 text-white font-bold py-4 rounded-2xl hover:bg-pink-500 transition shadow-lg active:scale-95">
                    太棒了，就吃這個！
                </button>
                <button onclick="emmaCloseModal()" class="bg-gray-100 text-gray-500 font-bold py-3 rounded-2xl hover:bg-gray-200 transition active:scale-95">
                    喵～想再轉一次
                </button>
            </div>
        </div>
    </div>

    <script src="meals.js"></script>
    <script>
        // ========== Shared audio ==========
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // ========== State ==========
        let currentUser = 'chris';
        const CHRIS_PALETTE = ["#DC2626", "#16A34A", "#2563EB", "#CA8A04", "#EA580C"];
        const state = {
            chris: {
                breakfastItems: MEALS.chris.map((text, i) => ({
                    text,
                    color: CHRIS_PALETTE[i % CHRIS_PALETTE.length]
                })),
                availableIndices: MEALS.chris.map((_, i) => i),
                isProcessing: false
            },
            emma: {
                options: [...MEALS.emma],
                removedOptions: [],
                currentRotation: 0,
                isSpinning: false,
                selectedIndex: -1
            }
        };

        // ========== User toggle ==========
        function setUser(name) {
            currentUser = name;
            document.body.dataset.user = name;
            document.querySelectorAll('[data-user-btn]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.userBtn === name);
            });
        }

        // ========== Chris ==========
        function chrisPlaySound(type) {
            initAudio();
            const startTime = audioCtx.currentTime;

            if (type === 'tick') {
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(120, startTime);
                osc1.frequency.linearRampToValueAtTime(40, startTime + 0.08);
                gain1.gain.setValueAtTime(0.08, startTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, startTime + 0.08);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start(startTime);
                osc1.stop(startTime + 0.08);

                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(800, startTime);
                gain2.gain.setValueAtTime(0.02, startTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, startTime + 0.04);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start(startTime);
                osc2.stop(startTime + 0.04);

            } else if (type === 'win') {
                [440, 554, 659, 880].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, startTime + i * 0.08);
                    gain.gain.setValueAtTime(0.1, startTime + i * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + i * 0.08 + 0.3);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime + i * 0.08);
                    osc.stop(startTime + i * 0.08 + 0.4);
                });
            }
        }

        function chrisRenderList() {
            const listContainer = document.getElementById('chrisStatusList');
            listContainer.innerHTML = '';
            state.chris.breakfastItems.forEach((item, idx) => {
                const isRemoved = !state.chris.availableIndices.includes(idx);
                const span = document.createElement('div');
                span.className = `option-tag px-3 py-1.5 rounded-full border text-xs font-bold flex items-center gap-2 ${isRemoved ? 'removed bg-gray-800/20 border-gray-800 text-gray-600' : 'bg-gray-800 border-gray-700 text-white'}`;
                span.innerHTML = `<div class="w-2 h-2 rounded-full shadow-[0_0_5px_rgba(255,255,255,0.2)]" style="background-color: ${item.color}"></div>${item.text}`;
                listContainer.appendChild(span);
            });
        }

        function chrisMoveCube() {
            const isRow = Math.random() > 0.5;
            const index = Math.floor(Math.random() * 3);
            const direction = Math.random() > 0.5 ? 1 : -1;

            const cellElements = [];
            if (isRow) {
                for (let i = 0; i < 3; i++) cellElements.push(document.getElementById(`chris-cell-${index * 3 + i}`));
            } else {
                for (let i = 0; i < 3; i++) cellElements.push(document.getElementById(`chris-cell-${index + i * 3}`));
            }

            chrisPlaySound('tick');

            cellElements.forEach(el => {
                const moveVal = direction * 105;
                el.style.transform = isRow ? `translateX(${moveVal}%)` : `translateY(${moveVal}%)`;
            });

            setTimeout(() => {
                cellElements.forEach(el => {
                    el.style.transition = 'none';
                    el.style.transform = 'translate(0,0)';
                    const randomItemIdx = Math.floor(Math.random() * state.chris.breakfastItems.length);
                    el.style.backgroundColor = state.chris.breakfastItems[randomItemIdx].color;
                    setTimeout(() => el.style.transition = 'transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s', 10);
                });
            }, 180);
        }

        function chrisStartSelection() {
            if (state.chris.isProcessing || state.chris.availableIndices.length === 0) return;
            state.chris.isProcessing = true;

            let count = 0;
            const maxMoves = 18;
            const interval = setInterval(() => {
                chrisMoveCube();
                count++;
                if (count >= maxMoves) {
                    clearInterval(interval);
                    setTimeout(chrisFinalizeSelection, 400);
                }
            }, 220);
        }

        function chrisFinalizeSelection() {
            const luckyIdx = Math.floor(Math.random() * state.chris.availableIndices.length);
            const itemIdx = state.chris.availableIndices[luckyIdx];
            const result = state.chris.breakfastItems[itemIdx];

            const cells = document.querySelectorAll('#chrisCubeGrid .cube-cell');
            cells.forEach((cell, i) => {
                cell.style.backgroundColor = result.color;
                cell.style.boxShadow = `inset 0 0 20px rgba(0,0,0,0.5), 0 0 15px ${result.color}44`;
                if (i === 4) cell.innerText = result.text;
            });

            state.chris.availableIndices.splice(luckyIdx, 1);

            setTimeout(() => {
                chrisShowResult(result);
                chrisRenderList();
                state.chris.isProcessing = false;
            }, 700);
        }

        function chrisShowResult(item) {
            const modal = document.getElementById('chrisModal');
            document.getElementById('chrisResultText').innerText = item.text;
            document.getElementById('chrisModalColorStrip').style.backgroundColor = item.color;
            modal.classList.remove('hidden');
            chrisPlaySound('win');
            chrisCreateConfetti(item.color);
        }

        function chrisCloseModal() {
            document.getElementById('chrisModal').classList.add('hidden');
            const cells = document.querySelectorAll('#chrisCubeGrid .cube-cell');
            const defaultColors = ['#DC2626', '#2563EB', '#16A34A', '#EA580C', '#CA8A04', '#F1F5F9', '#DC2626', '#2563EB', '#16A34A'];
            cells.forEach((cell, i) => {
                cell.style.backgroundColor = defaultColors[i];
                cell.style.boxShadow = 'inset 0 0 12px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3)';
                cell.innerText = "";
            });
        }

        function chrisResetOptions() {
            state.chris.availableIndices = state.chris.breakfastItems.map((_, i) => i);
            chrisRenderList();
            chrisCloseModal();
        }

        function chrisCreateConfetti(color) {
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = '50vw';
                conf.style.top = '50vh';
                conf.style.backgroundColor = color;
                conf.style.borderRadius = '2px';
                document.body.appendChild(conf);
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 250;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                conf.animate([
                    { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], { duration: 1200 + Math.random() * 800, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }).onfinish = () => conf.remove();
            }
        }

        // ========== Emma ==========
        function emmaDrawCat(ctx, x, y, size, breakfastType) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = "white";
            ctx.strokeStyle = "#ffdee7";
            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.ellipse(0, 0, size, size*0.8, 0, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-size*0.6, -size*0.5); ctx.lineTo(-size*0.8, -size); ctx.lineTo(-size*0.2, -size*0.7);
            ctx.fill(); ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(size*0.6, -size*0.5); ctx.lineTo(size*0.8, -size); ctx.lineTo(size*0.2, -size*0.7);
            ctx.fill(); ctx.stroke();

            ctx.fillStyle = "#444";
            ctx.beginPath(); ctx.arc(-size*0.3, -size*0.1, size*0.08, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(size*0.3, -size*0.1, size*0.08, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = "#ffcad4";
            ctx.globalAlpha = 0.6;
            ctx.beginPath(); ctx.arc(-size*0.5, size*0.1, size*0.15, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(size*0.5, size*0.1, size*0.15, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;

            ctx.strokeStyle = "#ff9aaf";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0.1, size*0.1, 0, Math.PI); ctx.stroke();

            ctx.font = `${size}px serif`;
            ctx.textAlign = "center";
            let icon = "🥯";
            if(breakfastType === "鮪魚蛋吐司") icon = "🥪";
            if(breakfastType === "肉鬆蛋吐司") icon = "🍞";
            if(breakfastType === "穀片") icon = "🥣";
            if(breakfastType === "葡萄乾吐司") icon = "🍇";
            if(breakfastType === "地瓜") icon = "🍠";
            if(breakfastType === "小叮噹蛋糕") icon = "🎂";

            if(breakfastType) ctx.fillText(icon, 0, size * 0.8);

            ctx.restore();
        }

        const emmaCanvas = document.getElementById('emmaWheelCanvas');
        const emmaCtx = emmaCanvas.getContext('2d');
        const emmaSpinBtn = document.getElementById('emmaSpinBtn');
        const emmaActiveListEl = document.getElementById('emmaActiveList');
        const emmaRemovedListEl = document.getElementById('emmaRemovedList');
        const emmaModalEl = document.getElementById('emmaModal');

        function emmaPlaySfx(freq, type, dur) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        const emmaMeowAudio = new Audio('cat-meow.mp3');
        emmaMeowAudio.preload = 'auto';
        emmaMeowAudio.volume = 0.5;

        function emmaPlayMeow() {
            try {
                emmaMeowAudio.currentTime = 0;
                emmaMeowAudio.play();
            } catch(e) {}
        }

        function emmaDrawWheel() {
            const size = emmaCanvas.width;
            const center = size / 2;
            const radius = center - 40;
            emmaCtx.clearRect(0, 0, size, size);

            if (state.emma.options.length === 0) {
                emmaCtx.fillStyle = "#ffdee7";
                emmaCtx.beginPath(); emmaCtx.arc(center, center, radius, 0, Math.PI*2); emmaCtx.fill();
                emmaCtx.fillStyle = "#ff9aaf";
                emmaCtx.font = "bold 40px sans-serif";
                emmaCtx.textAlign = "center";
                emmaCtx.fillText("請復原喵喵～", center, center);
                return;
            }

            const arcSize = (Math.PI * 2) / state.emma.options.length;
            state.emma.options.forEach((opt, i) => {
                const angle = i * arcSize;
                emmaCtx.fillStyle = i % 2 === 0 ? "#ffffff" : "#fff0f3";
                emmaCtx.beginPath();
                emmaCtx.moveTo(center, center);
                emmaCtx.arc(center, center, radius, angle, angle + arcSize);
                emmaCtx.fill();
                emmaCtx.strokeStyle = "#ffdee7";
                emmaCtx.lineWidth = 4;
                emmaCtx.stroke();

                emmaCtx.save();
                emmaCtx.translate(center, center);
                emmaCtx.rotate(angle + arcSize / 2);
                emmaDrawCat(emmaCtx, radius * 0.65, 0, 40, opt);
                emmaCtx.rotate(Math.PI / 2);
                emmaCtx.fillStyle = "#ff8fa3";
                emmaCtx.font = state.emma.options.length > 8 ? "bold 24px sans-serif" : "bold 28px sans-serif";
                emmaCtx.textAlign = "center";
                emmaCtx.fillText(opt, 0, -radius * 0.35);
                emmaCtx.restore();
            });

            emmaCtx.fillStyle = "white";
            emmaCtx.beginPath(); emmaCtx.arc(center, center, 80, 0, Math.PI*2); emmaCtx.fill();
            emmaCtx.strokeStyle = "#ffdee7";
            emmaCtx.lineWidth = 6;
            emmaCtx.stroke();
            emmaDrawCat(emmaCtx, center, center, 45, "");
        }

        function emmaSpin() {
            if (state.emma.isSpinning || state.emma.options.length === 0) return;
            initAudio();

            state.emma.isSpinning = true;
            const duration = 4000;
            const extraSpins = 8 + Math.random() * 5;
            const totalRotation = extraSpins * 360 + Math.random() * 360;

            state.emma.currentRotation += totalRotation;
            emmaCanvas.style.transform = `rotate(${state.emma.currentRotation}deg)`;

            let ticks = 0;
            const interval = setInterval(() => {
                if(!state.emma.isSpinning) return;
                emmaPlaySfx(600 + (ticks % 5 * 100), 'sine', 0.1);
                ticks++;
            }, 150);

            setTimeout(() => {
                clearInterval(interval);
                state.emma.isSpinning = false;
                const actual = (state.emma.currentRotation % 360);
                const arc = 360 / state.emma.options.length;
                const adjusted = (360 - actual + 270) % 360;
                state.emma.selectedIndex = Math.floor(adjusted / arc) % state.emma.options.length;

                emmaPlayMeow();
                emmaShowResult(state.emma.options[state.emma.selectedIndex]);
            }, duration);
        }

        function emmaShowResult(item) {
            document.getElementById('emmaModalMsg').innerText = item;
            const mCanvas = document.getElementById('emmaModalCatCanvas');
            const mCtx = mCanvas.getContext('2d');
            mCtx.clearRect(0,0,150,150);
            emmaDrawCat(mCtx, 75, 75, 50, item);
            emmaModalEl.classList.remove('hidden');
        }

        function emmaCloseModal() { emmaModalEl.classList.add('hidden'); }

        function emmaConfirmRemoval() {
            if (state.emma.selectedIndex !== -1) {
                state.emma.removedOptions.push(state.emma.options.splice(state.emma.selectedIndex, 1)[0]);
                state.emma.selectedIndex = -1;
                emmaDrawWheel(); emmaUpdateLists(); emmaCloseModal();
            }
        }

        function emmaRestoreItem(index) {
            state.emma.options.push(state.emma.removedOptions.splice(index, 1)[0]);
            emmaDrawWheel(); emmaUpdateLists();
        }

        function emmaUpdateLists() {
            emmaActiveListEl.innerHTML = state.emma.options.map(item =>
                `<li class="list-item flex items-center gap-3 p-3 rounded-2xl shadow-sm">
                    <span class="text-2xl">🐱</span>
                    <span class="font-bold text-gray-600 text-base">${item}</span>
                </li>`
            ).join('');

            emmaRemovedListEl.innerHTML = state.emma.removedOptions.map((item, index) =>
                `<li class="flex justify-between items-center bg-white/50 p-2 px-4 rounded-xl text-gray-300">
                    <span class="line-through text-sm">${item}</span>
                    <button onclick="emmaRestoreItem(${index})" class="text-xs bg-pink-50 text-pink-400 px-3 py-1 rounded-full border border-pink-100 active:bg-pink-100">復原</button>
                </li>`
            ).join('');
        }

        emmaSpinBtn.addEventListener('click', emmaSpin);

        // ========== Init ==========
        chrisRenderList();
        emmaDrawWheel();
        emmaUpdateLists();
        setUser('chris');

        document.querySelectorAll('[data-user-btn]').forEach(btn =>
            btn.addEventListener('click', () => setUser(btn.dataset.userBtn))
        );
    </script>
</body>
</html>
